<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="laowei的博客文章">
    <title>文章详情 - laowei</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --text-color: #1f2937;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --border-color: #e5e7eb;
            --meta-color: #6b7280;
            --tag-bg: rgba(37, 99, 235, 0.1);
            --tag-color: #2563eb;
            --code-bg: #f6f8fa;
            --blockquote-border: #e5e7eb;
            --blockquote-bg: rgba(37, 99, 235, 0.03);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .dark {
            --primary-color: #60a5fa;
            --text-color: #e5e7eb;
            --bg-color: #111827;
            --card-bg: #1f2937;
            --border-color: #374151;
            --meta-color: #9ca3af;
            --tag-bg: rgba(96, 165, 250, 0.15);
            --tag-color: #60a5fa;
            --code-bg: #1a2332;
            --blockquote-border: #374151;
            --blockquote-bg: rgba(96, 165, 250, 0.05);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            line-height: 1.8;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 820px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        /* ===== 返回按钮 ===== */
        .back {
            margin-bottom: 24px;
        }

        .back a {
            color: var(--primary-color);
            text-decoration: none;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: opacity 0.2s;
        }

        .back a:hover {
            opacity: 0.8;
        }

        /* ===== 文章标题区 ===== */
        .article-header {
            margin-bottom: 24px;
        }

        .title {
            font-size: 26px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 12px;
        }

        .meta {
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--meta-color);
            font-size: 0.88rem;
            flex-wrap: wrap;
        }

        .meta-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .article-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .article-tag {
            font-size: 0.8rem;
            padding: 3px 10px;
            border-radius: 14px;
            background: var(--tag-bg);
            color: var(--tag-color);
        }

        /* ===== 文章内容 ===== */
        .content {
            font-size: 16px;
            line-height: 1.9;
        }

        .content h1, .content h2 {
            margin: 28px 0 12px;
            font-size: 1.5rem;
            font-weight: 700;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border-color);
        }

        .content h3, .content h4 {
            margin: 24px 0 10px;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .content p {
            margin-bottom: 16px;
        }

        .content a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .content a:hover {
            text-decoration: underline;
        }

        .content ul, .content ol {
            margin: 12px 0;
            padding-left: 24px;
        }

        .content li {
            margin-bottom: 6px;
        }

        .content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 16px 0;
        }

        .content blockquote {
            margin: 16px 0;
            padding: 12px 16px;
            border-left: 4px solid var(--blockquote-border);
            background: var(--blockquote-bg);
            border-radius: 0 8px 8px 0;
            color: var(--meta-color);
        }

        .content pre {
            background: var(--code-bg);
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 16px 0;
            position: relative;
        }

        .content code {
            font-family: "SF Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
            font-size: 0.9em;
        }

        .content :not(pre) > code {
            background: var(--code-bg);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--primary-color);
        }

        .content hr {
            border: none;
            border-top: 2px solid var(--border-color);
            margin: 24px 0;
        }

        /* ===== 文章导航 ===== */
        .article-nav {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
        }

        .nav-item {
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            text-decoration: none;
            color: var(--text-color);
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .nav-item:hover {
            border-color: var(--primary-color);
            background: var(--tag-bg);
        }

        .nav-item .nav-label {
            font-size: 0.78rem;
            color: var(--meta-color);
            margin-bottom: 4px;
        }

        .nav-item .nav-title {
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .nav-prev {
            text-align: left;
        }

        .nav-next {
            text-align: right;
        }

        /* ===== 加载/错误状态 ===== */
        .loading {
            text-align: center;
            padding: 50px 0;
            color: var(--meta-color);
            font-size: 0.9rem;
        }

        .loading::after {
            content: '';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        /* ===== 深色模式切换 ===== */
        .theme-toggle {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            box-shadow: var(--shadow);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 100;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .card {
                padding: 24px;
            }

            .title {
                font-size: 22px;
            }

            .article-nav {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <!-- Markdown 解析库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="back">
                <a href="index.html">← 返回主页</a>
            </div>

            <div id="article-body">
                <h1 class="title" id="title">文章加载中...</h1>
                <div class="meta" id="meta">
                    <span class="meta-item">📅 加载中...</span>
                </div>
                <div class="article-tags" id="article-tags"></div>
                <div class="content" id="content">
                    <div class="loading">正在加载文章内容</div>
                </div>
                <div class="article-nav" id="article-nav"></div>
            </div>
        </div>
    </div>

    <!-- 主题切换 -->
    <button class="theme-toggle" id="theme-toggle" title="切换深色/浅色模式">🌙</button>

    <script>
        const GITHUB_USERNAME = 'weishuai168';
        const REPO_NAME = 'blog';

        // ===== 深色模式 =====
        (function initTheme() {
            const saved = localStorage.getItem('blog_theme');
            if (saved === 'dark') {
                document.body.classList.add('dark');
                document.getElementById('theme-toggle').textContent = '☀️';
            } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.body.classList.add('dark');
                document.getElementById('theme-toggle').textContent = '☀️';
            }
        })();

        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            document.getElementById('theme-toggle').textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('blog_theme', isDark ? 'dark' : 'light');
        });

        // ===== 获取文章 ID =====
        const urlParams = new URLSearchParams(window.location.search);
        const issueId = parseInt(urlParams.get('id'));

        if (!issueId || isNaN(issueId)) {
            document.getElementById("article-body").innerHTML = `
                <h1 class="title">文章不存在</h1>
                <p>请从<a href="index.html">主页</a>点击文章进入。</p>
            `;
        } else {
            async function loadArticle() {
                try {
                    const response = await fetch(
                        `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/issues/${issueId}`,
                        { headers: { 'Accept': 'application/vnd.github.v3+json' } }
                    );

                    if (!response.ok) throw new Error(`请求失败：${response.status}`);
                    const issue = await response.json();

                    // 渲染标题
                    document.getElementById("title").innerText = issue.title;

                    // 渲染日期
                    const date = new Date(issue.created_at);
                    const dateStr = date.toLocaleDateString('zh-CN', {
                        year: 'numeric', month: 'long', day: 'numeric'
                    });
                    const updatedStr = new Date(issue.updated_at).toLocaleDateString('zh-CN', {
                        year: 'numeric', month: 'long', day: 'numeric'
                    });
                    document.getElementById("meta").innerHTML = `
                        <span class="meta-item">📅 发布于 ${dateStr}</span>
                        <span class="meta-item">✏️ 更新于 ${updatedStr}</span>
                        <span class="meta-item">🔢 Issue #${issue.number}</span>
                    `;

                    // 渲染标签
                    const tagsEl = document.getElementById("article-tags");
                    if (issue.labels && issue.labels.length > 0) {
                        tagsEl.innerHTML = issue.labels
                            .map(l => `<span class="article-tag">${l.name}</span>`)
                            .join('');
                    }

                    // 渲染正文
                    const content = issue.body || "暂无内容";
                    document.getElementById("content").innerHTML = marked.parse(content);

                    // 渲染文章导航（上一篇/下一篇）
                    renderArticleNav(issueId, issue.created_at);

                } catch (error) {
                    console.error('加载文章失败：', error);
                    document.getElementById("article-body").innerHTML = `
                        <h1 class="title">文章加载失败</h1>
                        <p>可能是以下原因：</p>
                        <ul>
                            <li>网络连接问题</li>
                            <li>文章 ID 错误</li>
                            <li>GitHub API 请求被限流</li>
                        </ul>
                        <p style="margin-top:16px"><a href="index.html">返回主页查看其他文章</a></p>
                    `;
                }
            }

            loadArticle();
        }

        // ===== 文章导航 =====
        async function renderArticleNav(currentId, currentDate) {
            const container = document.getElementById('article-nav');
            try {
                // 从缓存读取所有 issues
                let cached = null;
                try {
                    const data = JSON.parse(localStorage.getItem('blog_issues_cache') || '{}');
                    if (data.data && Date.now() - data.timestamp < 24 * 60 * 60 * 1000) {
                        cached = data.data;
                    }
                } catch (e) {}

                let issues = cached || [];
                if (issues.length === 0) {
                    const resp = await fetch(
                        `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/issues?state=all&per_page=100`,
                        { headers: { 'Accept': 'application/vnd.github.v3+json' } }
                    );
                    issues = await resp.json();
                    issues = issues.filter(i => !i.pull_request);
                }

                // 过滤当前文章，按日期排序
                issues = issues.filter(i => i.number !== currentId);
                issues.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

                const currentIndex = issues.findIndex(i => i.created_at === currentDate);
                const prev = currentIndex < issues.length - 1 ? issues[currentIndex + 1] : null;
                const next = currentIndex > 0 ? issues[currentIndex - 1] : null;

                let navHtml = '';
                if (prev) {
                    navHtml += `<a href="post.html?id=${prev.number}" class="nav-item nav-prev">
                        <div class="nav-label">← 上一篇</div>
                        <div class="nav-title">${prev.title}</div>
                    </a>`;
                } else {
                    navHtml += `<div class="nav-item nav-prev">
                        <div class="nav-label">← 上一篇</div>
                        <div class="nav-title">没有了</div>
                    </div>`;
                }
                if (next) {
                    navHtml += `<a href="post.html?id=${next.number}" class="nav-item nav-next">
                        <div class="nav-label">下一篇 →</div>
                        <div class="nav-title">${next.title}</div>
                    </a>`;
                } else {
                    navHtml += `<div class="nav-item nav-next">
                        <div class="nav-label">下一篇 →</div>
                        <div class="nav-title">没有了</div>
                    </div>`;
                }
                container.innerHTML = navHtml;
            } catch (e) {
                container.innerHTML = '';
            }
        }
    </script>
</body>
</html>
